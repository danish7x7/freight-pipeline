# Local dev: Redis only.
#
# The DATABASE of record is the Supabase Postgres (local stack on :54322), which also
# provides Auth + RLS + Storage. Supabase has no Redis, so compose supplies it. The api
# and worker run via `uv run` in dev (matching how the tests and the poller already run)
# — no cross-stack container networking. The Dockerfile is retained for the Phase 8
# cloud deploy of the backend. See DECISIONS 2026-06-11.
services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
